version: 1
verification:
  mode: append
  commands:
    - name: lint
      run: make lint
      timeout: 4m
post_execution:
  commands:
    - name: cleanup
      run: rm -rf .tmp-work
      when: always
      fail_on_error: false
exclude:
  cves:
    - CVE-2025-12345
  vulnerabilities:
    - id: GHSA-xxxx-yyyy-zzzz
      package: openssl
      ecosystem: deb
      path: images/Dockerfile
scan:
  skip_paths:
    - vendor/**
    - examples/legacy/**
registry:
  cache:
    dir: .patchpilot-cache/registry
    ttl: 4h
  auth:
    mode: none
oci:
  policies:
    - name: stable-golang
      source: docker.io/library/golang
      tags:
        allow:
          - '^v?\d+\.\d+\.\d+-alpine$'
        semver:
          - range:
              - ">=1.24.3 <2.0.0"
            includePrerelease: false
            prereleaseAllow: []
        deny:
          - '.*-debug$'
  external_images:
    - source: ghcr.io/external-secrets/external-secrets
      dockerfiles:
        - images/Dockerfile
      tag: latest-semver

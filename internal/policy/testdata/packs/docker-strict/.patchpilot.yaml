version: 1
oci:
  policies:
    - name: " strict "
      source: ghcr.io/example/*
      tags:
        allow:
          - '^v?\d+\.\d+\.\d+$'
          - '^v?\d+\.\d+\.\d+$'
        semver:
          - range:
              - " >=1.2.3 <2.0.0 "
              - ">=1.2.3 <2.0.0"
            includePrerelease: false
            prereleaseAllow:
              - '-rc\.'
              - '-rc\.'
        deny:
          - '-debug$'
          - '-debug$'

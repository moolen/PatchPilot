name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests
        run: make test

      - name: Integration tests
        run: make test.integration

      - name: Build
        run: make build

      - name: Smoke test packaged GitHub Action
        uses: ./
        with:
          command: scan
          dir: .
          acceptable_exit_codes: "0,23"

      - name: Notify Slack on failure
        if: ${{ failure() }}
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            exit 0
          fi
          payload=$(printf '{"text":"PatchPilot CI failed on %s (%s)"}' "${GITHUB_REF_NAME}" "${RUN_URL}")
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$WEBHOOK_URL"

      - name: Notify Teams on failure
        if: ${{ failure() }}
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            exit 0
          fi
          payload=$(printf '{"text":"PatchPilot CI failed on %s (%s)"}' "${GITHUB_REF_NAME}" "${RUN_URL}")
          curl -sS -H 'Content-Type: application/json' -d "$payload" "$WEBHOOK_URL"

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          "$(go env GOPATH)/bin/gosec" -exclude=G104,G204,G301,G304,G306,G703 ./...

      - name: Notify Slack on failure
        if: ${{ failure() }}
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            exit 0
          fi
          payload=$(printf '{"text":"PatchPilot security checks failed on %s (%s)"}' "${GITHUB_REF_NAME}" "${RUN_URL}")
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$WEBHOOK_URL"

name: Canary Benchmark

on:
  schedule:
    - cron: '43 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-canary-benchmark
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cobra
            ecosystem: go
            repo: https://github.com/spf13/cobra.git
          - name: gin
            ecosystem: go
            repo: https://github.com/gin-gonic/gin.git
          - name: zap
            ecosystem: go
            repo: https://github.com/uber-go/zap.git
          - name: go-git
            ecosystem: go
            repo: https://github.com/go-git/go-git.git
          - name: kustomize
            ecosystem: go
            repo: https://github.com/kubernetes-sigs/kustomize.git
          - name: express
            ecosystem: npm
            repo: https://github.com/expressjs/express.git
          - name: axios
            ecosystem: npm
            repo: https://github.com/axios/axios.git
          - name: eslint
            ecosystem: npm
            repo: https://github.com/eslint/eslint.git
          - name: requests
            ecosystem: pip
            repo: https://github.com/psf/requests.git
          - name: flask
            ecosystem: pip
            repo: https://github.com/pallets/flask.git
          - name: pydantic
            ecosystem: pip
            repo: https://github.com/pydantic/pydantic.git
          - name: junit5
            ecosystem: maven
            repo: https://github.com/junit-team/junit5.git

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install syft and grype
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build cvefix
        run: make build

      - name: Clone target repository
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _canary/repos
          git clone --depth 1 "${{ matrix.repo }}" "_canary/repos/${{ matrix.name }}"

      - name: Run canary fix benchmark
        id: benchmark
        shell: bash
        run: |
          set -euo pipefail
          run_dir="_canary/results/${{ matrix.name }}"
          repo_dir="_canary/repos/${{ matrix.name }}"
          mkdir -p "$run_dir"

          set +e
          ./bin/cvefix fix --dir "$repo_dir" --enable-agent=false --json >"$run_dir/cvefix.log" 2>&1
          code=$?
          set -e

          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

          case "$code" in
            0|21|22|23)
              echo "unexpected=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "unexpected=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

          if [[ -f "$repo_dir/.cvefix/run.json" ]]; then
            cp "$repo_dir/.cvefix/run.json" "$run_dir/run.json"
          fi
          if [[ -f "$repo_dir/.cvefix/summary.json" ]]; then
            cp "$repo_dir/.cvefix/summary.json" "$run_dir/summary.json"
          fi
          if [[ -f "$repo_dir/.cvefix/findings.json" ]]; then
            cp "$repo_dir/.cvefix/findings.json" "$run_dir/findings.json"
          fi

          before="n/a"
          fixed="n/a"
          after="n/a"
          if [[ -f "$run_dir/summary.json" ]]; then
            before=$(jq -r '.before // "n/a"' "$run_dir/summary.json")
            fixed=$(jq -r '.fixed // "n/a"' "$run_dir/summary.json")
            after=$(jq -r '.after // "n/a"' "$run_dir/summary.json")
          fi

          printf '%s\n' "| repo | ecosystem | exit code | before | fixed | after |" >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "| --- | --- | --- | --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          printf '| %s | %s | %s | %s | %s | %s |\n' \
            "${{ matrix.name }}" "${{ matrix.ecosystem }}" "$code" "$before" "$fixed" "$after" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload canary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-${{ matrix.name }}
          path: _canary/results/${{ matrix.name }}
          if-no-files-found: warn
          retention-days: 14

      - name: Fail on unexpected exit code
        if: ${{ steps.benchmark.outputs.unexpected == 'true' }}
        shell: bash
        run: |
          echo "Unexpected cvefix exit code for ${{ matrix.repo }}: ${{ steps.benchmark.outputs.exit_code }}"
          exit 1

name: Daily Dogfood

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: daily-dogfood
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install syft and grype
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build PatchPilot
        run: make build

      - name: Run PatchPilot remediation
        id: remediate
        shell: bash
        run: |
          set +e
          ./bin/patchpilot fix --dir . --enable-agent=false
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [[ "$code" -ne 0 && "$code" -ne 23 ]]; then
            exit "$code"
          fi

      - name: Run local CI checks
        id: local_ci
        continue-on-error: true
        run: |
          make test
          make test.integration
          make build

      - name: Create pull request for remediation
        id: cpr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          branch: automation/daily-patchpilot
          delete-branch: true
          commit-message: 'chore: daily PatchPilot remediation'
          title: 'chore: daily CVE remediation'
          body: |
            Automated daily remediation run.

            - `patchpilot fix` exit code: `${{ steps.remediate.outputs.exit_code }}`
            - local CI outcome: `${{ steps.local_ci.outcome }}`

            Auto-merge is attempted only when all vulnerabilities are fixed (`exit code 0`) and CI checks pass.
          labels: |
            dependencies
            security
            automation

      - name: Wait for PR checks and auto-merge when safe
        if: ${{ steps.cpr.outputs.pull-request-number != '' && steps.remediate.outputs.exit_code == '0' && steps.local_ci.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          pr_number='${{ steps.cpr.outputs.pull-request-number }}'
          echo "Waiting for required checks on PR #$pr_number"

          for attempt in $(seq 1 60); do
            set +e
            gh pr checks "$pr_number" --required
            status=$?
            set -e

            if [[ "$status" -eq 0 ]]; then
              echo "Checks passed, merging PR #$pr_number"
              gh pr merge "$pr_number" --squash --delete-branch
              exit 0
            fi

            if [[ "$status" -eq 1 ]]; then
              echo "Required checks failed for PR #$pr_number"
              exit 1
            fi

            echo "Checks still pending for PR #$pr_number (attempt $attempt/60)"
            sleep 30
          done

          echo "Timed out waiting for required checks on PR #$pr_number"
          exit 1

      - name: Create or update failure issue
        if: ${{ failure() }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const title = "Daily dogfood remediation is failing";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "The scheduled dogfood workflow failed.",
              "",
              `- Run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
              `- SHA: ${context.sha}`,
              "",
              "Please inspect logs and fix before the next scheduled run."
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Notify Slack on failure
        if: ${{ failure() }}
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            exit 0
          fi
          payload=$(printf '{"text":"PatchPilot daily dogfood failed (%s)"}' "${RUN_URL}")
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$WEBHOOK_URL"

      - name: Notify Teams on failure
        if: ${{ failure() }}
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            exit 0
          fi
          payload=$(printf '{"text":"PatchPilot daily dogfood failed (%s)"}' "${RUN_URL}")
          curl -sS -H 'Content-Type: application/json' -d "$payload" "$WEBHOOK_URL"

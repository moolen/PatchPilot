name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify build and tests
        run: |
          make test
          make build

      - name: Compute next semantic version tag
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          existing_at_head=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [[ -n "$existing_at_head" ]]; then
            echo "tag=$existing_at_head" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          if [[ -z "$latest" ]]; then
            next="v0.1.0"
          else
            version="${latest#v}"
            IFS='.' read -r major minor patch <<< "$version"
            patch=$((patch + 1))
            next="v${major}.${minor}.${patch}"
          fi

          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.semver.outputs.created == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.semver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.tag }}
          generate_release_notes: true

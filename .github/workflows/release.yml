name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify build and tests
        run: |
          make test
          make test.integration
          make build

      - name: Compute next semantic version tag (conventional commits)
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          existing_at_head=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [[ -n "$existing_at_head" ]]; then
            echo "tag=$existing_at_head" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          if [[ -z "$latest" ]]; then
            next="v0.1.0"
          else
            version="${latest#v}"
            IFS='.' read -r major minor patch <<< "$version"

            range="${latest}..HEAD"
            bump="patch"
            if git log "$range" --format='%s%n%b' | grep -Eiq 'BREAKING CHANGE|^[a-zA-Z0-9_-]+(\([^)]+\))?!:'; then
              bump="major"
            elif git log "$range" --format='%s' | grep -Eq '^feat(\([^)]+\))?: '; then
              bump="minor"
            fi

            case "$bump" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              *)
                patch=$((patch + 1))
                ;;
            esac

            next="v${major}.${minor}.${patch}"
          fi

          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.semver.outputs.created == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.semver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Derive image version
        if: steps.semver.outputs.created == 'true'
        id: image-version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.semver.outputs.tag }}"
          version="${tag#v}"
          major="${version%%.*}"
          minor_patch="${version#*.}"
          minor="${minor_patch%%.*}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "major_minor=$major.$minor" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.semver.outputs.created == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.semver.outputs.created == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.semver.outputs.created == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push patchpilot-app image
        if: steps.semver.outputs.created == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.patchpilot-app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/patchpilot-app:latest
            ghcr.io/${{ github.repository_owner }}/patchpilot-app:${{ steps.image-version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/patchpilot-app:${{ steps.image-version.outputs.major_minor }}
            ghcr.io/${{ github.repository_owner }}/patchpilot-app:${{ steps.image-version.outputs.major }}

      - name: Publish release artifacts
        if: steps.semver.outputs.created == 'true'
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack on failure
        if: ${{ failure() }}
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            exit 0
          fi
          payload=$(printf '{"text":"PatchPilot release workflow failed on %s (%s)"}' "${GITHUB_REF_NAME}" "${RUN_URL}")
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$WEBHOOK_URL"

      - name: Notify Teams on failure
        if: ${{ failure() }}
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            exit 0
          fi
          payload=$(printf '{"text":"PatchPilot release workflow failed on %s (%s)"}' "${GITHUB_REF_NAME}" "${RUN_URL}")
          curl -sS -H 'Content-Type: application/json' -d "$payload" "$WEBHOOK_URL"

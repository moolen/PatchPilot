version: 2

project_name: patchpilot

builds:
  - id: patchpilot
    binary: patchpilot
    main: ./cmd/patchpilot
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: patchpilot-archive
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  use: github-native
